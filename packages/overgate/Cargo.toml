[package]
name = "overrid-overgate"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Rust API ingress service skeleton for Overrid Overgate."

[dependencies]
axum = "0.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.38", features = ["macros", "net", "rt-multi-thread", "signal"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }

[[bin]]
name = "overgate"
path = "src/main.rs"

[lib]
path = "src/lib.rs"

[lints]
workspace = true
