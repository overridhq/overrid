schema_version = 1
manifest_version = "2026-06-21.repository-layout-phase-3"
workspace_name = "overrid"
source_sds = "docs/sds/foundation/repository_layout.md"
source_build_plan = "docs/build_plan/sub_build_plan_005_repository_layout.md"
tech_stack_decision = "docs/overrid_tech_stack_choice.md"

[validation_metadata]
layout_phase = 3
command_consumers = [
    "layout:check",
    "build",
    "test",
    "schema:check",
    "docs:check",
]

[module_record_schema]
required_fields = [
    "name",
    "type",
    "owner_layer",
    "path",
    "master_phase",
    "public_contract_path",
    "allowed_dependency_groups",
    "generated_output_paths",
    "test_targets",
    "local_stack_participation",
    "documentation_links",
]
accepted_module_types = [
    "rust_schema_crate",
    "rust_sdk_crate",
    "rust_cli_crate",
    "rust_helper_crate",
    "typescript_client_surface",
    "local_infra_contract",
    "integration_test_root",
    "docs_contract",
    "service_contract_root",
]
accepted_owner_layers = [
    "foundation_contracts",
    "developer_tooling",
    "local_development",
    "integration_validation",
    "client_surface",
    "runtime_service_contracts",
    "documentation_contracts",
]
accepted_dependency_groups = [
    "none",
    "contracts",
    "sdk",
    "cli",
    "local_stack",
    "integration_harness",
    "admin_ui_shell",
    "docs",
    "local_infra",
]
accepted_lifecycle_states = [
    "scaffolded",
    "contracted",
    "wired",
    "validated",
    "accepted",
]
accepted_local_stack_participation = [
    "none",
    "source_contract",
    "scenario_consumer",
    "profile_consumer",
    "helper_crate",
]

[drift_report]
reason_codes = [
    "missing_schema_version",
    "missing_module_records",
    "missing_required_field",
    "duplicate_module_name",
    "invalid_path",
    "missing_path",
    "unknown_module_type",
    "unknown_owner_layer",
    "invalid_master_phase",
    "unknown_dependency_group",
    "missing_public_contract",
    "stale_documentation_link",
    "missing_test_target",
    "forbidden_generated_path",
    "missing_local_stack_participation",
    "cargo_member_drift",
    "unlisted_module",
]

[workspace_inventory]
cargo_workspace_manifest = "Cargo.toml"
cargo_members = [
    "packages/schemas/overrid_contracts",
    "packages/sdk",
    "packages/local_stack",
    "packages/integration_harness",
    "packages/cli",
]
package_roots = [
    "packages/admin_ui_shell",
    "packages/schemas",
    "packages/sdk",
    "packages/cli",
    "packages/integration_harness",
    "packages/local_stack",
]
local_profile_roots = [
    "infra/local/profiles",
    "infra/local/service-definitions",
]
test_roots = [
    "tests/integration",
]
spec_roots = [
    "docs/specs",
]

[[modules]]
name = "shared-schemas"
type = "rust_schema_crate"
owner_layer = "foundation_contracts"
path = "packages/schemas"
master_phase = 0
public_contract_path = "packages/schemas/README.md"
cargo_member = "packages/schemas/overrid_contracts"
cargo_package = "overrid-contracts"
lifecycle_state = "accepted"
allowed_dependency_groups = ["none"]
generated_output_paths = []
test_targets = ["cargo test -p overrid-contracts"]
local_stack_participation = "none"
documentation_links = [
    "docs/sds/foundation/shared_schema_package.md",
    "docs/build_plan/sub_build_plan_007_shared_schema_package.md",
    "docs/service_catalog/foundation/shared_schema_package.md",
]

