schema_version = 1
manifest_version = "2026-06-21.repository-layout-phase-10"
workspace_name = "overrid"
source_sds = "docs/sds/foundation/repository_layout.md"
source_build_plan = "docs/build_plan/sub_build_plan_005_repository_layout.md"
tech_stack_decision = "docs/overrid_tech_stack_choice.md"

[validation_metadata]
layout_phase = 10
command_consumers = [
    "layout:check",
    "build",
    "test",
    "test:integration",
    "dev:start",
    "dev:stop",
    "dev:reset",
    "dev:seed",
    "dev:status",
    "dev:smoke",
    "schema:check",
    "docs:check",
]

[module_record_schema]
required_fields = [
    "name",
    "type",
    "owner_layer",
    "path",
    "master_phase",
    "public_contract_path",
    "allowed_dependency_groups",
    "generated_output_paths",
    "test_targets",
    "local_stack_participation",
    "documentation_links",
]
accepted_module_types = [
    "rust_schema_crate",
    "rust_sdk_crate",
    "rust_cli_crate",
    "rust_helper_crate",
    "rust_service_crate",
    "typescript_client_surface",
    "local_infra_contract",
    "integration_test_root",
    "docs_contract",
    "service_contract_root",
]
accepted_owner_layers = [
    "foundation_contracts",
    "developer_tooling",
    "local_development",
    "integration_validation",
    "client_surface",
    "runtime_service_contracts",
    "documentation_contracts",
]
accepted_dependency_groups = [
    "none",
    "contracts",
    "sdk",
    "cli",
    "local_stack",
    "integration_harness",
    "admin_ui_shell",
    "docs",
    "local_infra",
    "control_plane_modules",
    "node_agent_modules",
    "docs_specs",
]
accepted_lifecycle_states = [
    "proposed",
    "scaffolded",
    "contracted",
    "wired",
    "validated",
    "accepted",
    "deprecated",
    "removed",
]
accepted_local_stack_participation = [
    "none",
    "source_contract",
    "scenario_consumer",
    "profile_consumer",
    "helper_crate",
]

[drift_report]
reason_codes = [
    "missing_schema_version",
    "missing_module_records",
    "missing_required_field",
    "duplicate_module_name",
    "invalid_path",
    "missing_path",
    "unknown_module_type",
    "unknown_owner_layer",
    "invalid_master_phase",
    "unknown_dependency_group",
    "missing_public_contract",
    "stale_documentation_link",
    "missing_test_target",
    "forbidden_generated_path",
    "missing_local_stack_participation",
    "cargo_member_drift",
    "unlisted_module",
]

[workspace_inventory]
cargo_workspace_manifest = "Cargo.toml"
cargo_members = [
    "packages/schemas/overrid_contracts",
    "packages/sdk",
    "packages/local_stack",
    "packages/integration_harness",
    "packages/overgate",
    "packages/overkey",
    "packages/cli",
]
package_roots = [
    "packages/admin_ui_shell",
    "packages/schemas",
    "packages/sdk",
    "packages/cli",
    "packages/integration_harness",
    "packages/local_stack",
    "packages/overgate",
    "packages/overkey",
]
local_profile_roots = [
    "infra/local/profiles",
    "infra/local/service-definitions",
]
test_roots = [
    "tests/integration",
]
spec_roots = [
    "docs/specs",
]

[contract_authority]
schema_source_roots = [
    "packages/schemas/admin_ui/v0",
    "packages/schemas/overrid_contracts/v0",
]
fixture_roots = [
    "packages/schemas/admin_ui/fixtures/valid",
    "packages/schemas/admin_ui/fixtures/invalid",
    "packages/schemas/overrid_contracts/fixtures/valid",
    "packages/schemas/overrid_contracts/fixtures/invalid",
]
codegen_manifests = [
    "packages/schemas/admin_ui/codegen_manifest.json",
    "packages/schemas/overrid_contracts/codegen_manifest.json",
]
approved_generated_roots = [
    "packages/schemas/admin_ui/generated",
    "packages/schemas/overrid_contracts/src/lib.rs",
    "docs/specs/generated",
]
service_contract_template = "docs/specs/service_contract_template.md"
reason_event_contracts = "docs/specs/reason_codes_and_events.md"
contract_authority_spec = "docs/specs/contract_authority.md"
optional_protobuf_root = "packages/schemas/protobuf"
optional_protobuf_requires_sds_and_spec = true
source_of_truth = "json_schema"

[root_command_registry]
registry_version = "repository-layout-phase-5"
owner = "overrid-cli"
alias_policy = "thin_alias_only"
machine_readable_result_envelope = true
validation_artifacts = [
    "layout_check.passed",
    "layout_check.failed",
    "package_boundary_violation",
    "missing_service_contract",
    "missing_test_target",
    "generated_file_committed",
    "secret_file_committed",
    "schema_ref_missing",
    "premature_service_split",
    "split_review_missing",
    "local_test_boundary_violation",
    "local_state_committed",
    "docdex_index_hygiene_violation",
    "artifact_redaction_violation",
    "module_lifecycle_violation",
    "stale_layout_reference",
    "local_stack_discovery_violation",
    "harness_discovery_violation",
    "ci_command_sequence_violation",
    "validation_evidence_missing",
    "artifact_consumer_violation",
    "sub_build_plan_structure_violation",
    "tech_stack_alignment_violation",
    "master_plan_alignment_violation",
    "source_document_alignment_violation",
    "downstream_handoff_violation",
]

[package_boundary_enforcement]
phase_gate = "repository-layout-phase-6"
states = [
    "dependency_direction_groups_defined",
    "shared_schema_dependency_paths_enforced",
    "modular_control_plane_shape_preserved",
    "split_review_criteria_defined",
    "local_test_only_separation_enforced",
]
dependency_direction_groups = [
    "contracts",
    "sdk",
    "cli",
    "local_stack",
    "integration_harness",
    "admin_ui_shell",
    "docs",
    "local_infra",
    "control_plane_modules",
    "node_agent_modules",
    "docs_specs",
]
shared_schema_dependency_source = "packages/schemas"
rust_contract_projection = "packages/schemas/overrid_contracts"
schema_ref_contract = "docs/specs/contract_authority.md"
control_plane_default_shape = "single_modular_rust_process_through_phase_3"
control_plane_path = "services/control-plane"
node_agent_path = "services/node-agent"
split_review_first_allowed_phase = 4
grid_resident_split_review_phase = 7
split_review_required_evidence = [
    "api_load",
    "failure_isolation",
    "security_boundary",
    "operational_pressure",
    "grid_resident_backbone_pressure",
]
runtime_forbidden_dependency_groups = [
    "integration_harness",
    "local_stack",
    "local_infra",
    "admin_ui_shell",
    "docs",
]
local_test_only_groups = [
    "local_stack",
    "integration_harness",
    "local_infra",
    "integration-tests",
]
violation_artifacts = [
    "package_boundary_violation",
    "schema_ref_missing",
    "premature_service_split",
    "split_review_missing",
    "local_test_boundary_violation",
]
validation_script = "scripts/validate_repository_layout_phase6.py"

[artifact_hygiene]
phase_gate = "repository-layout-phase-7"
states = [
    "generated_output_ignore_rules_defined",
    "local_state_ignore_rules_defined",
    "secret_file_rules_defined",
    "docdex_indexing_hygiene_defined",
    "artifact_redaction_expectations_defined",
]
generated_output_roots = [
    "target",
    "node_modules",
    "coverage",
    "logs",
    "docs/specs/generated",
    "packages/schemas/admin_ui/generated",
    "infra/local/artifacts",
    "tests/integration/artifacts",
]
approved_generated_projection_files = [
    "packages/schemas/admin_ui/generated/typescript/admin_ui_contracts.d.ts",
    "packages/schemas/admin_ui/generated/typescript/admin_read_api_contracts.d.ts",
    "packages/schemas/overrid_contracts/src/lib.rs",
]
local_state_roots = [
    ".overrid",
    "infra/local/state",
    "infra/local/job-tables",
    "infra/local/artifacts",
    "tests/integration/artifacts",
]
local_state_marker_files = [
    "infra/local/state/.gitignore",
    "infra/local/job-tables/.gitignore",
    "infra/local/artifacts/.gitignore",
    "tests/integration/artifacts/.gitignore",
    "docs/specs/generated/.gitignore",
]
secret_file_deny_patterns = [
    ".env",
    ".env.*",
    "*.local.*",
    "*.secret.*",
    "*.key",
    "*.pem",
    "*.p12",
    "*.pfx",
    "*.token",
    "secrets.*",
    "id_ed25519",
]
allowed_secret_example_patterns = [
    ".env.example",
    "*.example",
]
docdex_index_include_roots = [
    "docs/build_plan",
    "docs/sds",
    "docs/service_catalog",
    "docs/specs",
    "packages/schemas/admin_ui/fixtures",
    "packages/schemas/overrid_contracts/v0",
    "packages/schemas/overrid_contracts/fixtures",
]
docdex_index_exclude_roots = [
    "target",
    "node_modules",
    "coverage",
    "logs",
    ".overrid",
    "infra/local/state",
    "infra/local/job-tables",
    "infra/local/artifacts",
    "tests/integration/artifacts",
    "docs/specs/generated",
    "packages/schemas/admin_ui/generated",
]
redaction_classes = [
    "secret",
    "key",
    "token",
    "signature",
    "private_payload",
    "encrypted_content",
    "fixture_credential",
]
violation_artifacts = [
    "generated_file_committed",
    "secret_file_committed",
    "local_state_committed",
    "docdex_index_hygiene_violation",
    "artifact_redaction_violation",
    "module_lifecycle_violation",
    "stale_layout_reference",
]
validation_script = "scripts/validate_repository_layout_phase7.py"
docdex_ignore_file = ".docdexignore"
git_ignore_file = ".gitignore"

